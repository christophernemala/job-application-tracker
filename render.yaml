# Render Blueprint for AI Job Agent
services:
  - type: web
    name: job-application-tracker
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      apt-get update && apt-get install -y wget gnupg2
      wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | apt-key add -
      echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" > /etc/apt/sources.list.d/google-chrome.list
      apt-get update && apt-get install -y google-chrome-stable
    startCommand: gunicorn job_agent.app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: NAUKRI_GULF_EMAIL
        sync: false
      - key: NAUKRI_GULF_PASSWORD
        sync: false
      - key: JOB_AGENT_NAME
        value: "Christopher Nemala"
      - key: JOB_AGENT_EMAIL
        value: "christophernemala@gmail.com"
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: LINKEDIN_EMAIL
        sync: false
      - key: LINKEDIN_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: APIFY_API_TOKEN
        sync: false
      - key: JOB_AGENT_PHONE
        value: "+971-565839277"
      - key: JOB_AGENT_LOCATION
        value: "Dubai, UAE"
