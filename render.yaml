# Render Blueprint for AI Job Agent
services:
  - type: web
    name: job-application-tracker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn job_agent.app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: NAUKRI_GULF_EMAIL
        sync: false
      - key: NAUKRI_GULF_PASSWORD
        sync: false
      - key: JOB_AGENT_NAME
        value: "Christopher Nemala"
      - key: JOB_AGENT_EMAIL
        value: "christophernemala@gmail.com"
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: LINKEDIN_EMAIL
        sync: false
      - key: LINKEDIN_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: APIFY_TOKEN
        sync: false
      - key: MOCK_MODE
        value: "false"
      - key: JOB_AGENT_PHONE
        value: "+971-565839277"
      - key: JOB_AGENT_LOCATION
        value: "Dubai, UAE"
      - key: FLASK_SECRET_KEY
        sync: false
      - key: DASHBOARD_USERNAME
        value: "admin"
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_URL
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
