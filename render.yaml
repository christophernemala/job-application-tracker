services:
  - type: web
    name: job-application-tracker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn job_agent.app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.15"
      - key: JOB_AGENT_MAX_JOBS
        value: "40"
      - key: JOB_AGENT_MIN_SCORE_TO_SAVE
        value: "65"
      - key: DASHBOARD_USERNAME
        value: "admin"
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: FLASK_SECRET_KEY
        sync: false
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_DATABASE_ID
        sync: false
      - key: NOTION_DATA_SOURCE_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
