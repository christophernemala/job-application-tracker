# Render Blueprint for AI Job Agent
services:
  - type: web
    name: job-application-tracker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn job_agent.app:app
    envVars:
      # ── Naukri Gulf credentials — set in Render dashboard ──
      - key: NAUKRI_GULF_EMAIL
        sync: false
      - key: NAUKRI_GULF_PASSWORD
        sync: false
      # ── Dashboard login — set in Render dashboard ──
      - key: DASHBOARD_USERNAME
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
      # ── Flask session secret — set in Render dashboard ──
      - key: FLASK_SECRET_KEY
        sync: false
      # ── OpenAI (optional — enables AI features) ──
      - key: OPENAI_API_KEY
        sync: false
      # ── User profile (override defaults via Render if needed) ──
      - key: JOB_AGENT_NAME
        sync: false
      - key: JOB_AGENT_EMAIL
        sync: false
      - key: JOB_AGENT_PHONE
        sync: false
      - key: JOB_AGENT_LOCATION
        sync: false
      - key: JOB_AGENT_CURRENT_ROLE
        sync: false
      - key: JOB_AGENT_YEARS_EXPERIENCE
        sync: false
