name: Copilot Automatic Review

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  pull-requests: write

jobs:
  request-copilot-review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - name: Request Copilot review
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const copilotReviewer = "copilot-pull-request-reviewer[bot]";

            try {
              await github.rest.pulls.requestReviewers({
                owner,
                repo,
                pull_number,
                reviewers: [copilotReviewer],
              });
              core.info(`Requested ${copilotReviewer} review for #${pull_number}.`);
            } catch (error) {
              const errors = error.response?.data?.errors ?? [];
              const alreadyRequested = error.status === 422
                && errors.some((entry) => entry.code === "already_exists");

              if (alreadyRequested) {
                core.info(`${copilotReviewer} was already requested for #${pull_number}.`);
                return;
              }

              throw error;
            }
